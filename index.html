function renderDashboard(){
    const totalEmp=DB.employees.length;
    const active=DB.employees.filter(e=>e.status==='نشط').length;
    const orgCount=DB.orgUnits.length;
    const deptCount=DB.orgUnits.filter(o=>['إدارة','إدارة عامة','مديرية'].includes(o.type)).length;
    const jobs=DB.jobs.length;
    const assignedJobs=DB.employees.filter(e=>e.jobId).length;
    const jobCompletion=totalEmp?Math.round(assignedJobs/totalEmp*100):0;
    const avg=avgPerformance();
    const highPerf=DB.appraisals.filter(a=>calcAppraisal(a)>=85).length;
    const lowPerf=DB.appraisals.filter(a=>calcAppraisal(a)<70).length;
    const kpiAchievement=DB.appraisals.length?Math.round(DB.appraisals.reduce((s,a)=>s+calcAppraisal(a),0)/DB.appraisals.length):0;
    const budget=budgetTotals();
    const courses=DB.courses.length;
    const completedCourses=DB.courses.filter(c=>c.status==='مكتمل').length;
    const trainingHours=DB.courses.reduce((s,c)=>s+Number(c.hours||0),0);
    const trainingCost=DB.courses.reduce((s,c)=>s+Number(c.cost||0),0);
    const costPerEmp=totalEmp?Math.round(trainingCost/totalEmp):0;
    const readySucc=DB.successors.filter(s=>Number(s.performance||0)>=80 && Number(s.potential||0)>=80).length;

function kpiCard(t,v,icon,color,sub=''){return `<div class="card p-4 hover:-translate-y-0.5 transition-all"><div class="flex items-start justify-between gap-3"><div><span class="text-[10px] font-black text-slate-400 block">${t}</span><strong class="text-2xl font-black text-slate-950 mt-1 block">${v}</strong><small class="text-[10px] font-bold text-slate-400">${sub}</small></div><div class="w-11 h-11 rounded-2xl bg-${color}-50 text-${color}-600 flex items-center justify-center"><i class="fa-solid ${icon}"></i></div></div></div>`}

function advisor(t,v,color){return `<div class="bg-white/80 border border-${color}-100 rounded-2xl p-4"><span class="text-[10px] font-black text-${color}-700 block mb-1">${t}</span><strong class="text-slate-800 leading-relaxed">${esc(v)}</strong></div>`}
function empty(t){return `<div class="p-6 text-center text-xs text-slate-400 font-bold">${t}</div>`}

function budgetTotals(){let planned=(DB.budgetItems||[]).reduce((s,x)=>s+Number(x.planned||0),0), actual=(DB.budgetItems||[]).reduce((s,x)=>s+Number(x.actual||0),0);return {planned,actual,remaining:planned-actual,rate:planned?Math.round(actual/planned*100):0}}

function skillList(job){return String(job.skills||'').split(/[،,]/).map(x=>x.trim()).filter(Boolean)}
function examScoreByCompetency(empId,comp){let arr=(DB.exams||[]).filter(e=>e.employeeId===empId && (!comp || e.competency===comp));return arr.length?Math.round(arr.reduce((s,x)=>s+Number(x.score||0),0)/arr.length):60}
function gapRowsForEmployee(e){let job=byId(DB.jobs,e.jobId);let skills=skillList(job);return skills.map(sk=>{let current=examScoreByCompetency(e.id,sk);let target=85;let gap=Math.max(target-current,0);let course=(DB.courses||[]).find(c=>String(c.description+' '+c.title+' '+c.kpi).includes(sk))||DB.courses?.[0]||{};return {skill:sk,current,target,gap,course:course.title||'برنامج تطوير عام'}})}
function renderGap(){let empId=document.getElementById('gapEmp')?.value||DB.employees[0]?.id;let e=byId(DB.employees,empId)||DB.employees[0]||{};let rows=e.id?gapRowsForEmployee(e):[];let avg=rows.length?Math.round(rows.reduce((s,x)=>s+x.current,0)/rows.length):0;document.getElementById('tab-gap').innerHTML=`<div class="flex flex-col sm:flex-row justify-between gap-3"><div><h2 class="text-2xl font-black">تحليل فجوات المهارات والجدارات</h2><p class="text-xs text-slate-500">مقارنة مستوى الموظف الحالي مع متطلبات الوصف الوظيفي، مع توصية تلقائية بالورش المناسبة.</p></div><select id="gapEmp" onchange="renderGap()" class="field max-w-sm">${DB.employees.map(x=>`<option value="${x.id}" ${x.id===e.id?'selected':''}>${esc(x.name)} - ${jobName(x.jobId)}</option>`).join('')}</select></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4">${stat('الموظف',esc(e.name),'fa-user','indigo')}${stat('الوظيفة',jobName(e.jobId),'fa-id-card','emerald')}${stat('متوسط الجدارة',avg+'%','fa-gauge-high','amber')}${stat('متوسط الفجوة',Math.max(85-avg,0)+'%','fa-chart-gantt','rose')}</div><div class="card overflow-x-auto"><table class="w-full text-xs min-w-[850px]"><thead class="bg-slate-50"><tr><th class="p-3 text-right">الجدارة المطلوبة</th><th class="p-3">الحالي</th><th class="p-3">المستهدف</th><th class="p-3">الفجوة</th><th class="p-3">البرنامج المقترح</th><th class="p-3">مؤشر بصري</th></tr></thead><tbody class="divide-y">${rows.map(r=>`<tr><td class="p-3 font-black">${esc(r.skill)}</td><td class="p-3 text-center font-black">${r.current}%</td><td class="p-3 text-center">${r.target}%</td><td class="p-3 text-center font-black ${r.gap>15?'text-rose-600':'text-emerald-700'}">${r.gap}%</td><td class="p-3 text-indigo-700 font-black">${esc(r.course)}</td><td class="p-3"><div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-2 bg-indigo-500" style="width:${Math.min(r.current,100)}%"></div></div></td></tr>`).join('')||`<tr><td colspan="6">${empty('لا توجد بيانات')}</td></tr>`}</tbody></table></div>`}
function renderTraining(){document.getElementById('tab-training').innerHTML=`<div class="flex flex-col sm:flex-row justify-between gap-3"><div><h2 class="text-2xl font-black">دليل ومواصفات ورش العمل والبرامج التدريبية</h2><p class="text-xs text-slate-500">إدارة البرامج، التكلفة، المدرب، الساعات، الربط بالـ KPIs، وتقييم الأثر.</p></div><button onclick="openCourseForm()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>إضافة برنامج</button></div><div class="grid grid-cols-1 md:grid-cols-3 gap-5">${(DB.courses||[]).map(c=>`<div class="card p-5"><div class="flex justify-between"><span class="badge bg-indigo-50 text-indigo-700">${esc(c.status)}</span><span class="text-xs text-slate-400 font-bold">${esc(c.date)}</span></div><h3 class="font-black text-lg mt-3">${esc(c.title)}</h3><p class="text-xs text-slate-500 mt-2 leading-relaxed">${esc(c.description)}</p><div class="grid grid-cols-2 gap-2 mt-4 text-xs"><div class="bg-slate-50 rounded-xl p-3"><b>المدرب</b><br>${esc(c.trainer)}</div><div class="bg-slate-50 rounded-xl p-3"><b>الساعات</b><br>${esc(c.hours)} ساعة</div><div class="bg-slate-50 rounded-xl p-3"><b>التكلفة</b><br>${Number(c.cost||0).toLocaleString()} ر.ع</div><div class="bg-slate-50 rounded-xl p-3"><b>KPI</b><br>${esc(c.kpi)}</div></div><div class="no-print mt-4 flex gap-2"><button onclick="openCourseForm('${c.id}')" class="btn btn-soft py-2">تعديل</button><button onclick="del('courses','${c.id}')" class="btn btn-danger py-2">حذف</button></div></div>`).join('')||empty('لا توجد برامج')}</div>`}
function nineBoxCell(sc){let p=Number(sc.performance||0), po=Number(sc.potential||0);let row=po>=85?'قدرة عالية':po>=70?'قدرة متوسطة':'قدرة منخفضة';let col=p>=85?'أداء عالٍ':p>=70?'أداء متوسط':'أداء منخفض';return row+' / '+col}

developmentPlan)}</td><td class="p-3 no-print"><button onclick="openSuccessionForm('${sc.id}')" class="btn btn-soft py-2">تعديل</button> <button onclick="del('successors','${sc.id}')" class="btn btn-danger py-2">حذف</button></td></tr>`).join('')}</tbody></table></div>`}
function renderSurveys(){let n=(DB.surveys||[]).length||1, avg=k=>Math.round((DB.surveys||[]).reduce((s,x)=>s+Number(x[k]||0),0)/n*10)/10;document.getElementById('tab-surveys').innerHTML=`<div class="flex flex-col sm:flex-row justify-between gap-3"><div><h2 class="text-2xl font-black">استمارات قياس الآراء ورضى المتدربين والخبراء</h2><p class="text-xs text-slate-500">تحليل رضا المتدربين عن المحتوى والمدرب والتنظيم والأثر العملي.</p></div><button onclick="openSurveyForm()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>تسجيل استمارة</button></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4">${stat('جودة المحتوى',avg('content')+'/5','fa-book','indigo')}${stat('أداء المدرب',avg('instructor')+'/5','fa-chalkboard-user','emerald')}${stat('التنظيم',avg('venue')+'/5','fa-building','amber')}${stat('الأثر العملي',avg('impact')+'/5','fa-chart-line','rose')}</div><div class="card overflow-x-auto"><table class="w-full text-xs min-w-[850px]"><thead class="bg-slate-50"><tr><th class="p-3 text-right">البرنامج</th><th class="p-3">المشارك</th><th class="p-3">المحتوى</th><th class="p-3">المدرب</th><th class="p-3">التنظيم</th><th class="p-3">الأثر</th><th class="p-3">ملاحظات</th><th class="p-3 no-print">إجراءات</th></tr></thead><tbody class="divide-y">${(DB.surveys||[]).map(v=>`<tr><td class="p-3 font-black">${esc((byId(DB.courses,v.courseId)||{}).title||v.courseId)}</td><td class="p-3 text-center">${esc(v.respondent)}</td><td class="p-3 text-center">${v.content}/5</td><td class="p-3 text-center">${v.instructor}/5</td><td class="p-3 text-center">${v.venue}/5</td><td class="p-3 text-center">${v.impact}/5</td><td class="p-3">${esc(v.comment)}</td><td class="p-3 no-print"><button onclick="openSurveyForm('${v.id}')" class="btn btn-soft py-2">تعديل</button> <button onclick="del('surveys','${v.id}')" class="btn btn-danger py-2">حذف</button></td></tr>`).join('')}</tbody></table></div>`}
function renderBudget(){let b=budgetTotals(), byDept={};(DB.budgetItems||[]).forEach(x=>{byDept[x.department]=byDept[x.department]||{planned:0,actual:0};byDept[x.department].planned+=Number(x.planned||0);byDept[x.department].actual+=Number(x.actual||0)});document.getElementById('tab-budget').innerHTML=`<div class="flex flex-col sm:flex-row justify-between gap-3"><div><h2 class="text-2xl font-black">إدارة الموازنة والصرف</h2><p class="text-xs text-slate-500">تخطيط الموازنة، تسجيل الصرف الفعلي، متابعة الانحرافات، وتعديل أو حذف أي بند.</p></div><button onclick="openBudgetForm()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>إضافة بند موازنة</button></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4">${stat('إجمالي المخطط',b.planned.toLocaleString()+' ر.ع','fa-coins','indigo')}${stat('إجمالي الفعلي',b.actual.toLocaleString()+' ر.ع','fa-money-bill-transfer','emerald')}${stat('المتبقي/الانحراف',b.remaining.toLocaleString()+' ر.ع','fa-scale-balanced','amber')}${stat('نسبة الصرف',b.rate+'%','fa-chart-pie','rose')}</div><div class="grid grid-cols-1 lg:grid-cols-2 gap-5"><div class="card p-5"><h3 class="font-black mb-4">الصرف حسب الإدارة</h3><div class="space-y-3">${Object.entries(byDept).map(([d,v])=>`<div><div class="flex justify-between text-xs font-bold mb-1"><span>${esc(d)}</span><span>${v.actual.toLocaleString()} / ${v.planned.toLocaleString()} ر.ع</span></div><div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-2 ${v.actual>v.planned?'bg-rose-500':'bg-indigo-500'} rounded-full" style="width:${Math.min(v.actual/Math.max(v.planned,1)*100,100)}%"></div></div></div>`).join('')||empty('لا توجد بيانات موازنة')}</div></div><div class="card p-5"><h3 class="font-black mb-4">تنبيهات مالية</h3>${b.actual>b.planned?`<div class="bg-rose-50 border border-rose-100 text-rose-700 rounded-2xl p-4 text-xs font-black">يوجد تجاوز في إجمالي الصرف الفعلي عن المخطط.</div>`:`<div class="bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-2xl p-4 function saveAppraisal(e,id){e.preventDefault();let f=new FormData(e.target), scores=[0,1,2,3,4,5].map(i=>({kpi:f.get('kpi'+i),actual:Number(f.get('actual'+i)||0),weight:Number(f.get('weight'+i)||0)})).filter(x=>x.kpi);let obj={id:id||uid('ap'),employeeId:f.get('employeeId'),period:f.get('period'),date:f.get('date'),scores,notes:f.get('notes')};upsert('appraisals',obj,id)}
function upsert(table,obj,id){if(id){let i=DB[table].findIndex(x=>x.id===id);DB[table][i]=obj}else DB[table].unshift(obj);save();closeModal();toast('تم الحفظ بنجاح');render(document.querySelector('main>section:not(.hidden)').id.replace('tab-',''))}
function del(table,id){if(!confirm('هل تريد حذف هذا البيان؟'))return;DB[table]=DB[table].filter(x=>x.id!==id);save();toast('تم الحذف');render(document.querySelector('main>section:not(.hidden)').id.replace('tab-',''))}
function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}

function openCourseForm(id=''){let c=id?byId(DB.courses,id):{title:'',trainer:'',target:'',hours:8,cost:0,date:new Date().toISOString().slice(0,10),status:'مجدول',kpi:'',description:''};openModal(id?'تعديل برنامج تدريبي':'إضافة برنامج تدريبي',`<form onsubmit="saveCourse(event,'${id}')" class="space-y-4"><div><label class="block text-xs font-black text-slate-600 mb-1">اسم البرنامج</label><input name="title" class="field" required placeholder="اسم البرنامج" value="${esc(c.title)}"></div><div class="grid sm:grid-cols-2 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">المدرب</label><input name="trainer" class="field" placeholder="المدرب" value="${esc(c.trainer)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">الفئة المستهدفة</label><input name="target" class="field" placeholder="الفئة المستهدفة" value="${esc(c.target)}"></div></div><div class="grid sm:grid-cols-4 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">عدد الساعات</label><input name="hours" type="number" class="field" placeholder="الساعات" value="${esc(c.hours)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">التكلفة</label><input name="cost" type="number" class="field" placeholder="التكلفة" value="${esc(c.cost)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تاريخ التنفيذ</label><input name="date" type="date" class="field" value="${esc(c.date)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">حالة البرنامج</label><select name="status" class="field"><option ${c.status==='مجدول'?'selected':''}>مجدول</option><option ${c.status==='نشط'?'selected':''}>نشط</option><option ${c.status==='مكتمل'?'selected':''}>مكتمل</option></select></div></div><div><label class="block text-xs font-black text-slate-600 mb-1">KPI مرتبط</label><input name="kpi" class="field" placeholder="KPI مرتبط" value="${esc(c.kpi)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">وصف البرنامج</label><textarea name="description" class="field" placeholder="وصف البرنامج">${esc(c.description)}</textarea></div><button class="btn btn-primary w-full">حفظ البرنامج</button></form>`)}
function saveCourse(e,id){e.preventDefault();let f=new FormData(e.target);upsert('courses',{id:id||uid('cr'),title:f.get('title'),trainer:f.get('trainer'),target:f.get('target'),hours:+f.get('hours'),cost:+f.get('cost'),date:f.get('date'),status:f.get('status'),kpi:f.get('kpi'),description:f.get('description')},id)}
function openSuccessionForm(id=''){let x=id?byId(DB.successors,id):{employeeId:DB.employees[0]?.id,targetJobId:DB.jobs[0]?.id,performance:80,potential:80,readiness:'جاهز خلال سنة',developmentPlan:''};openModal(id?'تعديل مرشح تعاقب':'إضافة مرشح تعاقب',`<form onsubmit="saveSuccession(event,'${id}')" class="space-y-4"><div class="grid sm:grid-cols-2 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">الموظف المرشح</label><select name="employeeId" class="field">${DB.employees.map(e=>`<option value="${e.id}" ${x.employeeId===e.id?'selected':''}>${esc(e.name)}</option>`).join('')}</select></div><div><label class="block text-xs font-black text-slate-600 mb-1">الوظيفة المستهدفة</label><select name="targetJobId" class="field">${DB.jobs.map(j=>`<option value="${j.id}" ${x.targetJobId===j.id?'selected':''}>${esc(j.title)}</option>`).join('')}</select></div></div><div class="grid sm:grid-cols-3 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">نسبة الأداء %</label><input name="performance" type="number" min="0" max="100" class="field" value="${esc(x.performance)}" placeholder="الأداء"></div><div><label class="block text-xs font-black text-slate-600 mb-1">نسبة الإمكانات %</label><input name="potential" type="number" min="0" max="100" class="field" value="${esc(x.potential)}" placeholder="الإمكانات"></div><div><label class="block text-xs font-black text-slate-600 mb-1">الجاهزية</label><input name="readiness" class="field" value="${esc(x.readiness)}" placeholder="الجاهزية"></div></div><div><label class="block text-xs font-black text-slate-600 mb-1">خطة التطوير</label><textarea name="developmentPlan" class="field" placeholder="خطة التطوير">${esc(x.developmentPlan)}</textarea></div><button class="btn btn-primary w-full">حفظ المرشح</button></form>`)}
function saveSuccession(e,id){e.preventDefault();let f=new FormData(e.target);upsert('successors',{id:id||uid('sc'),employeeId:f.get('employeeId'),targetJobId:f.get('targetJobId'),performance:+f.get('performance'),potential:+f.get('potential'),readiness:f.get('readiness'),developmentPlan:f.get('developmentPlan')},id)}
function openSurveyForm(id=''){let v=id?byId(DB.surveys,id):{courseId:DB.courses[0]?.id,respondent:'',content:5,instructor:5,venue:5,impact:5,comment:''};openModal(id?'تعديل استمارة رضا':'تسجيل استمارة رضا',`<form onsubmit="saveSurvey(event,'${id}')" class="space-y-4"><div><label class="block text-xs font-black text-slate-600 mb-1">البرنامج التدريبي</label><select name="courseId" class="field">${DB.courses.map(c=>`<option value="${c.id}" ${v.courseId===c.id?'selected':''}>${esc(c.title)}</option>`).join('')}</select></div><div><label class="block text-xs font-black text-slate-600 mb-1">اسم المشارك / اختياري</label><input name="respondent" class="field" placeholder="اسم المشارك / اختياري" value="${esc(v.respondent)}"></div><div class="grid sm:grid-cols-4 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">تقييم المحتوى</label><input name="content" type="number" min="1" max="5" class="field" value="${esc(v.content)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تقييم المدرب</label><input name="instructor" type="number" min="1" max="5" class="field" value="${esc(v.instructor)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تقييم التنظيم</label><input name="venue" type="number" min="1" max="5" class="field" value="${esc(v.venue)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تقييم الأثر</label><input name="impact" type="number" min="1" max="5" class="field" value="${esc(v.impact)}"></div></div><div><label class="block text-xs font-black text-slate-600 mb-1">ملاحظات المتدرب</label><textarea name="comment" class="field" placeholder="ملاحظات المتدرب">${esc(v.comment)}</textarea></div><button class="btn btn-primary w-full">حفظ الاستمارة</button></form>`)}
function saveSurvey(e,id){e.preventDefault();let f=new FormData(e.target);upsert('surveys',{id:id||uid('sv'),courseId:f.get('courseId'),respondent:f.get('respondent'),content:+f.get('content'),instructor:+f.get('instructor'),venue:+f.get('venue'),impact:+f.get('impact'),comment:f.get('comment')},id)}
function exportJSON(){download('talent_suite_full_data.json',JSON.stringify(DB,null,2),'application/json')}
function flattenRows(table){return DB[table].map(x=>{let y={...x};if(y.kpis)y.kpis=JSON.stringify(y.kpis);if(y.scores)y.scores=JSON.stringify(y.scores);return y})}
function exportCSV(table){let rows=flattenRows(table);if(!rows.length)return toast('لا توجد بيانات');let heads=Object.keys(rows[0]);let csv='\ufeff'+heads.join(',')+'\n'+rows.map(r=>heads.map(h=>'"'+String(r[h]??'').replace(/"/g,'""')+'"').join(',')).join('\n');download(table+'.csv',csv,'text/csv;charset=utf-8')}
function exportExcel(){if(typeof XLSX==='undefined'){toast('مكتبة Excel تحتاج اتصال إنترنت. استخدم CSV أو JSON.');return}let wb=XLSX.utils.book_new();['orgUnits','employees','jobs','questions','exams','appraisals','budgetItems','courses','successors','surveys'].forEach(t=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(flattenRows(t)),t));XLSX.writeFile(wb,'talent_suite_data.xlsx')}
function parseCSV(txt){let lines=txt.replace(/^\ufeff/,'').split(/\r?\n/).filter(Boolean);let heads=lines.shift().split(',').map(h=>h.replace(/^"|"$/g,''));return lines.map(line=>{let vals=line.match(/("([^"]|"")*"|[^,]+)/g)||[];let o={};heads.forEach((h,i)=>o[h]=(vals[i]||'').replace(/^"|"$/g,'').replace(/""/g,'"'));return o})}
function importFile(){let file=document.getElementById('importFile').files[0], target=document.getElementById('importTarget').value;if(!file)return toast('اختر ملفاً أولاً');let r=new FileReader();r.onload=e=>{try{let data;if(file.name.endsWith('.json')){data=JSON.parse(e.target.result);if(target==='all'){DB=data}else DB[target]=data}else if(file.name.endsWith('.csv')){DB[target]=parseCSV(e.target.result)}else{if(typeof XLSX==='undefined')return toast('مكتبة Excel تحتاج اتصال إنترنت');let wb=XLSX.read(e.target.result,{type:'array'});let ws=wb.Sheets[wb.SheetNames[0]];DB[target]=XLSX.utils.sheet_to_json(ws)};['jobs','appraisals'].forEach(t=>DB[t]?.forEach(x=>{if(typeof x.kpis==='string')try{x.kpis=JSON.parse(x.kpis)}catch(e){};if(typeof x.scores==='string')try{x.scores=JSON.parse(x.scores)}catch(e){}}));save();toast('تم الاستيراد بنجاح');render('data');updateHeader()}catch(err){alert('تعذر الاستيراد: '+err.message)}};if(file.name.match(/\.xlsx?$|\.xls$/))r.readAsArrayBuffer(file);else r.readAsText(file,'utf-8')}
function resetDemo(){localStorage.removeItem(KEY);location.reload()}
load();initTabs();render('dashboard');
</script>
