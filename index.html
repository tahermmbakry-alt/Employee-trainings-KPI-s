const DEFAULT_DB = JSON.parse(JSON.stringify(DB));
function uid(p){return p+Math.random().toString(36).slice(2,9)}
function save(){localStorage.setItem(KEY,JSON.stringify(DB));}
function load(){
  try{
    const s=localStorage.getItem(KEY);
    if(s){
      let old=JSON.parse(s);
      DB={...DEFAULT_DB,...old};
      ['orgUnits','employees','jobs','questions','exams','budgetItems','courses','successors','surveys','appraisals'].forEach(k=>{if(!Array.isArray(DB[k]))DB[k]=[]});
    }
    migrateCriticalJobs();
    ensureCriticalSeedData();
    ensureBulkSeedData();
    save();
  }catch(e){console.warn(e);DB=JSON.parse(JSON.stringify(DEFAULT_DB));migrateCriticalJobs();ensureCriticalSeedData();ensureBulkSeedData();save();}
}
function migrateCriticalJobs(){
  (DB.jobs||[]).forEach((j,idx)=>{
    if(typeof j.critical==='undefined')j.critical=false;
    if(!j.criticalLevel)j.criticalLevel=j.critical?'مرتفع':'متوسط';
    if(typeof j.maxVacancyDays==='undefined'||j.maxVacancyDays==='')j.maxVacancyDays=j.critical?45:90;
    if(typeof j.criticalReason==='undefined')j.criticalReason='';
    if(typeof j.vacancyImpact==='undefined')j.vacancyImpact='';
    if(typeof j.kpis==='string')try{j.kpis=JSON.parse(j.kpis)}catch(e){j.kpis=[]}
  });

function criticalStats(){
  const critical=criticalJobs();
  const covered=critical.filter(j=>successorsForJob(j.id).length>0);
  const ready=critical.filter(j=>readyNowForJob(j.id).length>0);
  const noAlt=critical.filter(j=>successorsForJob(j.id).length===0);
  const coverage=critical.length?Math.round(covered.length/critical.length*100):0;
  const readyRate=critical.length?Math.round(ready.length/critical.length*100):0;
  return {critical,covered,ready,noAlt,coverage,readyRate};
}

function renderOrgSubtree(parentId,allowed){
 const kids=DB.orgUnits.filter(o=>(o.parentId||'')===parentId && allowed.has(o.id));
 if(!kids.length)return '';
 return `<div class="org-children">${kids.map(k=>`<div class="org-child">${orgNodeCard(k)}${renderOrgSubtree(k.id,allowed)}</div>`).join('')}</div>`;
}
function renderOrgTreeFiltered(parent,allowedIds){
 const allowed=new Set(allowedIds||DB.orgUnits.map(x=>x.id));
 if(parent){
  const root=byId(DB.orgUnits,parent);
  if(!root||!allowed.has(parent))return '';
  return `<div class="org-children"><div class="org-child">${orgNodeCard(root)}${renderOrgSubtree(parent,allowed)}</div></div>`;
 }
 const roots=DB.orgUnits.filter(o=>!(o.parentId||'') && allowed.has(o.id));
 if(!roots.length)return '';
 return `<div class="org-children">${roots.map(r=>`<div class="org-child">${orgNodeCard(r)}${renderOrgSubtree(r.id,allowed)}</div>`).join('')}</div>`;
}

function jobOrgScope(id){
  if(!id)return null;
  const out=[id]; let changed=true;
  while(changed){changed=false;(DB.orgUnits||[]).forEach(o=>{if(o.parentId&&out.includes(o.parentId)&&!out.includes(o.id)){out.push(o.id);changed=true;}})}
  return out;
}

  const scope=jobOrgScope(jobCatalogState.org);
  return (DB.jobs||[]).filter(j=>{

    const hay=[j.title,j.grade,j.summary,j.tasks,j.skills,org,(j.kpis||[]).map(k=>k.name).join(' ')].join(' ').toLowerCase();
    if(q && !hay.includes(q)) return false;
    if(scope && !scope.includes(j.orgUnitId||'')) return false;
    if(jobCatalogState.grade && j.grade!==jobCatalogState.grade) return false;

    return true;
  });
}

function renderJobCompare(a,b){

  const row=(label,x,y)=>`<tr><td class="p-3 font-black bg-slate-50">${label}</td><td class="p-3">${x}</td><td class="p-3">${y}</td></tr>`;
  return `<div class="overflow-x-auto mt-4"><table class="w-full text-xs min-w-[760px]"><thead><tr><th class="p-3">البند</th><th class="p-3">${esc(ja.title)}</th><th class="p-3">${esc(jb.title)}</th></tr></thead><tbody>${row('المستوى',esc(ja.grade),esc(jb.grade))}${row('الوحدة',esc(jobOrgName(ja)),esc(jobOrgName(jb)))}${row('حرجة',ja.critical?'نعم - '+esc(ja.criticalLevel):'لا',jb.critical?'نعم - '+esc(jb.criticalLevel):'لا')}${row('البدلاء',successorsForJob(ja.id).length,successorsForJob(jb.id).length)}${row('المهارات',esc(ja.skills),esc(jb.skills))}</tbody></table></div>`;
}

function renderPerformance(){document.getElementById('tab-performance').innerHTML=`<div class="flex flex-col sm:flex-row justify-between gap-3"><div><h2 class="text-2xl font-black">نظام تقييم الأداء (Performance Appraisal)</h2><p class="text-xs text-slate-500">يربط الوصف الوظيفي بأهداف قابلة للقياس KPIs ويحسب تقييم الموظف دورياً.</p></div><button onclick="openAppraisalForm()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>تقييم جديد</button></div><div class="card overflow-x-auto"><table class="w-full text-xs min-w-[900px]"><thead class="bg-slate-50"><tr><th class="p-3 text-right">الموظف</th><th class="p-3">الفترة</th><th class="p-3">الوظيفة</th><th class="p-3">النتيجة</th><th class="p-3">ملاحظات</th><th class="p-3 no-print w-[105px]">إجراءات (Actions)</th></tr></thead><tbody class="divide-y">${DB.appraisals.map(a=>{let e=byId(DB.employees,a.employeeId);return `<tr><td class="p-3 font-black">${empName(a.employeeId)}</td><td class="p-3 text-center">${esc(a.period)}<small class="block text-slate-400">${esc(a.date)}</small></td><td class="p-3 text-center text-indigo-700 font-black">${jobName(e.jobId)}<div class="mt-1">${isCriticalJob(e.jobId)?'<span class="badge bg-rose-50 text-rose-700">يشغل وظيفة حرجة</span>':''}</div></td><td class="p-3 text-center"><span class="text-lg font-black ${calcAppraisal(a)>=85?'text-emerald-700':calcAppraisal(a)>=70?'text-amber-600':'text-rose-600'}">${calcAppraisal(a)}%</span></td><td class="p-3">${esc(a.notes)}</td><td class="p-3 text-center no-print"><div class="action-stack"><button onclick="openAppraisalForm('${a.id}')" class="btn btn-soft">تعديل (Edit)</button><button onclick="del('appraisals','${a.id}')" class="btn btn-danger">حذف (Delete)</button></div></td></tr>`}).join('')}</tbody></table></div>`}

function budgetTotals(){let planned=(DB.budgetItems||[]).reduce((s,x)=>s+Number(x.planned||0),0), actual=(DB.budgetItems||[]).reduce((s,x)=>s+Number(x.actual||0),0);return {planned,actual,remaining:planned-actual,rate:planned?Math.round(actual/planned*100):0}}

function skillList(job){return String(job.skills||'').split(/[،,]/).map(x=>x.trim()).filter(Boolean)}
function examScoreByCompetency(empId,comp){let arr=(DB.exams||[]).filter(e=>e.employeeId===empId && (!comp || e.competency===comp));return arr.length?Math.round(arr.reduce((s,x)=>s+Number(x.score||0),0)/arr.length):60}
function gapRowsForEmployee(e){let job=byId(DB.jobs,e.jobId);let skills=skillList(job);return skills.map(sk=>{let current=examScoreByCompetency(e.id,sk);let target=85;let gap=Math.max(target-current,0);let course=(DB.courses||[]).find(c=>String(c.description+' '+c.title+' '+c.kpi).includes(sk))||DB.courses?.[0]||{};return {skill:sk,current,target,gap,course:course.title||'برنامج تطوير عام'}})}
let GAP_FILTER={search:'',employeeId:''};
function gapEmployeeSearchText(e){
  const job=byId(DB.jobs,e.jobId)||{};
  return [e.name,e.number,e.email,e.status,orgName(e.orgUnitId),jobName(e.jobId),jobOrgName(job)].join(' ').toLowerCase();
}
function gapFilteredEmployees(){
  const q=String(GAP_FILTER.search||'').trim().toLowerCase();
  let rows=[...(DB.employees||[])];
  if(q) rows=rows.filter(e=>gapEmployeeSearchText(e).includes(q));
  return rows;
}
function setGapSearch(v){
  GAP_FILTER.search=v;
  const rows=gapFilteredEmployees();
  if(rows.length && !rows.some(e=>e.id===GAP_FILTER.employeeId)) GAP_FILTER.employeeId=rows[0].id;
  updateGapEmployeeOptions();
  renderGapDetails();
}
function setGapEmployee(id){GAP_FILTER.employeeId=id;renderGapDetails();}
function updateGapEmployeeOptions(){
  const box=document.getElementById('gapEmpList'); if(!box) return;
  const rows=gapFilteredEmployees();
  box.innerHTML=`<select id="gapEmp" onchange="setGapEmployee(this.value)" class="field">${rows.map(x=>`<option value="${x.id}" ${x.id===GAP_FILTER.employeeId?'selected':''}>${esc(x.name)} - ${orgName(x.orgUnitId)} - ${jobName(x.jobId)}</option>`).join('')}</select><div class="text-[10px] text-slate-400 font-bold mt-1">نتائج البحث: ${rows.length} موظف</div>`;
}
function renderGapDetails(){
  const wrap=document.getElementById('gapDetails'); if(!wrap) return;
  const filtered=gapFilteredEmployees();
  let empId=GAP_FILTER.employeeId || filtered[0]?.id || DB.employees[0]?.id;
  let e=byId(DB.employees,empId)||filtered[0]||DB.employees[0]||{};
  if(e.id) GAP_FILTER.employeeId=e.id;
  let rows=e.id?gapRowsForEmployee(e):[];
  let job=byId(DB.jobs,e.jobId)||{};
  let avg=rows.length?Math.round(rows.reduce((s,x)=>s+x.current,0)/rows.length):0;
  if(!e.id){wrap.innerHTML=empty('لا توجد بيانات مطابقة للبحث');return;}
  wrap.innerHTML=`${job.critical?`<div class="card p-4 bg-rose-50 border-rose-100"><div class="font-black text-rose-800"><i class="fa-solid fa-triangle-exclamation ml-2"></i>هذا الموظف يشغل وظيفة حرجة: ${esc(job.title)}</div><p class="text-xs text-rose-700 mt-1">أولوية سد الفجوات: ${criticalPriority(job.criticalLevel)} — لأن غياب شاغل الوظيفة قد يؤثر على استمرارية العمل.</p></div>`:''}<div class="grid grid-cols-1 md:grid-cols-5 gap-4">${stat('الموظف',esc(e.name),'fa-user','indigo')}${stat('الإدارة',orgName(e.orgUnitId),'fa-sitemap','slate')}${stat('الوظيفة',jobName(e.jobId),'fa-id-card','emerald')}${stat('متوسط الجدارة',avg+'%','fa-gauge-high','amber')}${stat(job.critical?'أولوية التدريب':'متوسط الفجوة',job.critical?criticalPriority(job.criticalLevel):Math.max(85-avg,0)+'%','fa-chart-gantt','rose')}</div><div class="card overflow-x-auto"><table class="w-full text-xs min-w-[900px]"><thead class="bg-slate-50"><tr><th class="p-3 text-right">الجدارة المطلوبة</th><th class="p-3">الحالي</th><th class="p-3">المستهدف</th><th class="p-3">الفجوة</th><th class="p-3">الأولوية</th><th class="p-3">البرنامج المقترح</th><th class="p-3">مؤشر بصري</th></tr></thead><tbody class="divide-y">${rows.map(r=>`<tr><td class="p-3 font-black">${esc(r.skill)}</td><td class="p-3 text-center font-black">${r.current}%</td><td class="p-3 text-center">${r.target}%</td><td class="p-3 text-center font-black ${r.gap>15||job.critical?'text-rose-600':'text-emerald-700'}">${r.gap}%</td><td class="p-3 text-center"><span class="badge ${job.critical?'bg-rose-50 text-rose-700':'bg-slate-50 text-slate-600'}">${job.critical?criticalPriority(job.criticalLevel):(r.gap>15?'عالية':'متوسطة')}</span></td><td class="p-3 text-indigo-700 font-black">${esc(r.course)}</td><td class="p-3"><div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-2 ${job.critical?'bg-rose-500':'bg-indigo-500'}" style="width:${Math.min(r.current,100)}%"></div></div></td></tr>`).join('')||`<tr><td colspan="7">${empty('لا توجد بيانات')}</td></tr>`}</tbody></table></div>`;
}
function renderGap(){
  const existing=document.getElementById('gapSearch')?.value;
  if(existing!==undefined) GAP_FILTER.search=existing;
  const rows=gapFilteredEmployees();
  if(!GAP_FILTER.employeeId || !rows.some(e=>e.id===GAP_FILTER.employeeId)) GAP_FILTER.employeeId=rows[0]?.id || DB.employees[0]?.id || '';

  updateGapEmployeeOptions();
  renderGapDetails();
}

.description)}</p><div class="grid grid-cols-2 gap-2 mt-4 text-xs"><div class="bg-slate-50 rounded-xl p-3"><b>المدرب</b><br>${esc(c.trainer)}</div><div class="bg-slate-50 rounded-xl p-3"><b>الساعات</b><br>${esc(c.hours)} ساعة</div><div class="bg-slate-50 rounded-xl p-3"><b>التكلفة</b><br>${Number(c.cost||0).toLocaleString()} ر.ع</div><div class="bg-slate-50 rounded-xl p-3"><b>KPI</b><br>${esc(c.kpi)}</div></div><div class="no-print mt-4 flex gap-2"><button onclick="openCourseForm('${c.id}')" class="btn btn-soft py-2">تعديل</button><button onclick="del('courses','${c.id}')" class="btn btn-danger py-2">حذف</button></div></div>`).join('')||empty('لا توجد برامج')}</div>`}

ssors','${sc.id}')" class="btn btn-danger py-2">حذف</button></td></tr>`}).join('')}</tbody></table></div>`}
function renderSurveys(){let n=(DB.surveys||[]).length||1, avg=k=>Math.round((DB.surveys||[]).reduce((s,x)=>s+Number(x[k]||0),0)/n*10)/10;document.getElementById('tab-surveys').innerHTML=`<div class="flex flex-col sm:flex-row justify-between gap-3"><div><h2 class="text-2xl font-black">استمارات قياس الآراء ورضى المتدربين والخبراء</h2><p class="text-xs text-slate-500">تحليل رضا المتدربين عن المحتوى والمدرب والتنظيم والأثر العملي.</p></div><button onclick="openSurveyForm()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>تسجيل استمارة</button></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4">${stat('جودة المحتوى',avg('content')+'/5','fa-book','indigo')}${stat('أداء المدرب',avg('instructor')+'/5','fa-chalkboard-user','emerald')}${stat('التنظيم',avg('venue')+'/5','fa-building','amber')}${stat('الأثر العملي',avg('impact')+'/5','fa-chart-line','rose')}</div><div class="card overflow-x-auto"><table class="w-full text-xs min-w-[850px]"><thead class="bg-slate-50"><tr><th class="p-3 text-right">البرنامج</th><th class="p-3">المشارك</th><th class="p-3">المحتوى</th><th class="p-3">المدرب</th><th class="p-3">التنظيم</th><th class="p-3">الأثر</th><th class="p-3">ملاحظات</th><th class="p-3 no-print w-[105px]">إجراءات (Actions)</th></tr></thead><tbody class="divide-y">${(DB.surveys||[]).map(v=>`<tr><td class="p-3 font-black">${esc((byId(DB.courses,v.courseId)||{}).title||v.courseId)}</td><td class="p-3 text-center">${esc(v.respondent)}</td><td class="p-3 text-center">${v.content}/5</td><td class="p-3 text-center">${v.instructor}/5</td><td class="p-3 text-center">${v.venue}/5</td><td class="p-3 text-center">${v.impact}/5</td><td class="p-3">${esc(v.comment)}</td><td class="p-3 no-print"><button onclick="openSurveyForm('${v.id}')" class="btn btn-soft py-2">تعديل</button> <button onclick="del('surveys','${v.id}')" class="btn btn-danger py-2">حذف</button></td></tr>`).join('')}</tbody></table></div>`}
function renderBudget(){let b=budgetTotals(), byDept={};(DB.budgetItems||[]).forEach(x=>{byDept[x.department]=byDept[x.department]||{planned:0,actual:0};byDept[x.department].planned+=Number(x.planned||0);byDept[x.department].actual+=Number(x.actual||0)});document.getElementById('tab-budget').innerHTML=`<div class="flex flex-col sm:flex-row justify-between gap-3"><div><h2 class="text-2xl font-black">إدارة الموازنة والصرف</h2><p class="text-xs text-slate-500">تخطيط الموازنة، تسجيل الصرف الفعلي، متابعة الانحرافات، وتعديل أو حذف أي بند.</p></div><button onclick="openBudgetForm()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>إضافة بند موازنة</button></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4">${stat('إجمالي المخطط',b.planned.toLocaleString()+' ر.ع','fa-coins','indigo')}${stat('إجمالي الفعلي',b.actual.toLocaleString()+' ر.ع','fa-money-bill-transfer','emerald')}${stat('المتبقي/الانحراف',b.remaining.toLocaleString()+' ر.ع','fa-scale-balanced','amber')}${stat('نسبة الصرف',b.rate+'%','fa-chart-pie','rose')}</div><div class="grid grid-cols-1 lg:grid-cols-2 gap-5"><div class="card p-5"><h3 class="font-black mb-4">الصرف حسب الإدارة</h3><div class="space-y-3">${Object.entries(byDept).map(([d,v])=>`<div><div class="flex justify-between text-xs font-bold mb-1"><span>${esc(d)}</span><span>${v.actual.toLocaleString()} / ${v.planned.toLocaleString()} ر.ع</span></div><div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-2 ${v.actual>v.planned?'bg-rose-500':'bg-indigo-500'} rounded-full" style="width:${Math.min(v.actual/Math.max(v.planned,1)*100,100)}%"></div></div></div>`).join('')||empty('لا توجد بيانات موازنة')}</div></div><div class="card p-5"><h3 class="font-black mb-4">تنبيهات مالية</h3>${b.actual>b.planned?`<div class="bg-rose-50 border border-rose-100 text-rose-700 rounded-2xl p-4 text-xs font-black">يوجد تجاوز في إجمالي الصرف الفعلي عن المخطط.</div>`:`<div class="bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-2xl p-4 text-xs font-black">الصرف الحالي داخل حدود الموازنة المخططة.</div>`}<div class="mt-3 text-xs text-slate-500 leading-relaxed">يمكن تصدير هذه الصفحة ضمن Excel/CSV/JSON من مركز البيانات.</div></div></div><div class="card overflow-x-auto"><table class="w-full text-xs min-w-[950px]"><thead class="bg-slate-50"><tr><th class="p-3 text-right">البند</th><th class="p-3">التاريخ</th><th class="p-3">الإدارة</th><th class="p-3">التصنيف</th><th class="p-3">المخطط</th><th class="p-3">الفعلي</th><th class="p-3">الانحراف</th><th class="p-3">ملاحظات</th><th class="p-3 no-print w-[105px]">إجراءات (Actions)</th></tr></thead><tbody class="divide-y">${(DB.budgetItems||[]).map(x=>{let diff=Number(x.planned||0)-Number(x.actual||0);return `<tr><td class="p-3 font-black">${esc(x.item)}</td><td class="p-3 text-center">${esc(x.date)}</td><td class="p-3 text-center">${esc(x.department)}</td><td class="p-3 text-center"><span class="badge bg-indigo-50 text-indigo-700">${esc(x.category)}</span></td><td class="p-3 text-center font-black">${Number(x.planned||0).toLocaleString()}</td><td class="p-3 text-center font-black">${Number(x.actual||0).toLocaleString()}</td><td class="p-3 text-center font-black ${diff<0?'text-rose-600':'text-emerald-700'}">${diff.toLocaleString()}</td><td class="p-3">${esc(x.notes)}</td><td class="p-3 text-center no-print"><button onclick="openBudgetForm('${x.id}')" class="btn btn-soft py-2">تعديل</button> <button onclick="del('budgetItems','${x.id}')" class="btn btn-danger py-2">حذف</button></td></tr>`}).join('')||`<tr><td colspan="9">${empty('لا توجد بنود موازنة')}</td></tr>`}</tbody></table></div>`}

function renderData(){document.getElementById('tab-data').innerHTML=`<div><h2 class="text-2xl font-black">مركز البيانات والتبادل</h2><p class="text-xs text-slate-500">تصدير واستيراد كامل أو جزئي للبيانات بصيغ Excel وCSV وJSON.</p></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-5"><div class="card p-5 space-y-3"><h3 class="font-black">تصدير البيانات</h3><div class="grid grid-cols-2 gap-2"><button onclick="exportJSON()" class="btn btn-primary">JSON كامل</button><button onclick="exportExcel()" class="btn btn-primary">Excel Workbook</button><button onclick="exportCSV('employees')" class="btn btn-soft">CSV الموظفون</button><button onclick="exportCSV('orgUnits')" class="btn btn-soft">CSV الهيكل</button><button onclick="exportCSV('jobs')" class="btn btn-soft">CSV الوصف</button><button onclick="exportCSV('questions')" class="btn btn-soft">CSV الأسئلة</button><button onclick="exportCSV('appraisals')" class="btn btn-soft">CSV التقييم</button><button onclick="exportCSV('budgetItems')" class="btn btn-soft">CSV الموازنة</button><button onclick="exportCSV('courses')" class="btn btn-soft">CSV البرامج</button><button onclick="exportCSV('successors')" class="btn btn-soft">CSV التعاقب</button><button onclick="exportCSV('surveys')" class="btn btn-soft">CSV الرضا</button><button onclick="window.print()" class="btn btn-dark">طباعة/حفظ PDF</button></div></div><div class="card p-5 space-y-3"><h3 class="font-black">استيراد البيانات</h3><label class="block text-xs font-black text-slate-600 mb-1">نوع البيانات المراد استيرادها</label><select id="importTarget" class="field"><option value="all">JSON كامل للنظام</option><option value="employees">الموظفون CSV/Excel</option><option value="orgUnits">الهيكل CSV/Excel</option><option value="jobs">الوصف الوظيفي CSV/Excel</option><option value="questions">بنك الأسئلة CSV/Excel</option><option value="appraisals">التقييم CSV/Excel</option><option value="budgetItems">الموازنة CSV/Excel</option><option value="courses">البرامج التدريبية CSV/Excel</option><option value="successors">التعاقب CSV/Excel</option><option value="surveys">استمارات الرضا CSV/Excel</option></select><label class="block text-xs font-black text-slate-600 mb-1">اختر ملف البيانات</label><input type="file" id="importFile" accept=".json,.csv,.xlsx,.xls" class="field"><button onclick="importFile()" class="btn btn-primary w-full">استيراد وتحديث النظام</button><button onclick="resetDemo()" class="btn btn-danger w-full">استعادة بيانات تجريبية</button><p class="text-[11px] text-slate-500 leading-relaxed">ملاحظة: ملف Excel يستورد أول ورقة فقط إلى الجدول المختار. JSON الكامل يستبدل جميع بيانات النظام.</p></div></div>`}
function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function options(arr,selected,blank='-- اختر --'){return `<option value="">${blank}</option>`+arr.map(x=>`<option value="${x.id}" ${x.id===selected?'selected':''}>${esc(x.name||x.title)}</option>`).join('')}

function fieldBlock(label, inner, extra='') { return `<div class="${extra}"><label class="block text-xs font-black text-slate-600 mb-1">${label}</label>${inner}</div>`; }
function openOrgForm(id=''){let o=id?byId(DB.orgUnits,id):{id:'',name:'',type:'',parentId:'',managerEmployeeId:''};openModal(id?'تعديل وحدة تنظيمية':'إضافة وحدة تنظيمية',`<form onsubmit="saveOrg(event,'${id}')" class="space-y-4"><div><label class="block text-xs font-black text-slate-600 mb-1">اسم الوحدة</label><input name="name" class="field" required placeholder="اسم الوحدة" value="${esc(o.name)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">نوع الوحدة</label><input name="type" class="field" required placeholder="النوع: إدارة/قسم/مديرية" value="${esc(o.type)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تتبع إلى</label><select name="parentId" class="field">${options(DB.orgUnits.filter(x=>x.id!==id),o.parentId,'جذر الهيكل')}</select></div><div><label class="block text-xs font-black text-slate-600 mb-1">مدير الوحدة</label><select name="managerEmployeeId" class="field">${options(DB.employees,o.managerEmployeeId,'لا يوجد')}</select></div><button class="btn btn-primary w-full">حفظ</button></form>`)}
function saveOrg(e,id){e.preventDefault();let f=new FormData(e.target), obj={id:id||uid('org'),name:f.get('name'),type:f.get('type'),parentId:f.get('parentId'),managerEmployeeId:f.get('managerEmployeeId')};upsert('orgUnits',obj,id)}

function saveJob(e,id){e.preventDefault();let f=new FormData(e.target), kpis=[0,1,2,3].map(i=>({name:f.get('kpi'+i),target:Number(f.get('target'+i)||0),weight:Number(f.get('weight'+i)||0)})).filter(k=>k.name);let obj={id:id||uid('job'),title:f.get('title'),grade:f.get('grade'),critical:!!f.get('critical'),criticalLevel:f.get('criticalLevel')||'متوسط',criticalReason:f.get('criticalReason')||'',vacancyImpact:f.get('vacancyImpact')||'',maxVacancyDays:Number(f.get('maxVacancyDays')||0),summary:f.get('summary'),tasks:f.get('tasks'),skills:f.get('skills'),kpis};upsert('jobs',obj,id)}

function openExamForm(){openModal('تنفيذ اختبار موظف',`<form onsubmit="runExam(event)" class="space-y-4"><label class="block text-xs font-black text-slate-600 mb-1">الموظف</label><select name="employeeId" class="field" required>${options(DB.employees,'')}</select><label class="text-xs font-black">الجدارة / المجال</label><input name="competency" class="field" placeholder="اتركها فارغة لاستخدام جميع الأسئلة"><p class="text-xs text-slate-500">سيتم احتساب نتيجة تجريبية من اختيار الإجابات في النموذج التالي.</p><div id="examQuestions" class="space-y-3">${DB.questions.map(q=>`<div class="bg-slate-50 rounded-2xl p-3"><strong class="text-xs">${esc(q.question)}</strong><select name="ans_${q.id}" class="field mt-2"><option value="a">A - ${esc(q.a)}</option><option value="b">B - ${esc(q.b)}</option><option value="c">C - ${esc(q.c)}</option><option value="d">D - ${esc(q.d)}</option></select></div>`).join('')}</div><button class="btn btn-primary w-full">حفظ نتيجة الاختبار</button></form>`)}
function runExam(e){e.preventDefault();let f=new FormData(e.target), total=DB.questions.length||1, ok=0;DB.questions.forEach(q=>{if(f.get('ans_'+q.id)===q.correct)ok++});DB.exams.unshift({id:uid('exam'),employeeId:f.get('employeeId'),competency:f.get('competency')||'اختبار شامل',date:new Date().toISOString().slice(0,10),score:Math.round(ok/total*100)});save();closeModal();toast('تم حفظ نتيجة الاختبار');renderTests();}

function openAppraisalForEmployee(empId){let emp=byId(DB.employees,empId), job=byId(DB.jobs,emp.jobId), kpis=(job.kpis||[]).map(k=>({kpi:k.name,actual:k.target,weight:k.weight}));openModal('تقييم أداء جديد',`<form onsubmit="saveAppraisal(event,'')" class="space-y-4"><div><label class="block text-xs font-black text-slate-600 mb-1">الموظف</label><select name="employeeId" class="field">${options(DB.employees,empId)}</select></div><div class="grid sm:grid-cols-2 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">فترة التقييم</label><input name="period" class="field" required placeholder="مثال: الربع الأول 2026"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تاريخ التقييم</label><input name="date" type="date" class="field" value="${new Date().toISOString().slice(0,10)}"></div></div><div class="bg-slate-50 rounded-2xl p-4">${[0,1,2,3,4,5].map(i=>`<div class="grid grid-cols-12 gap-2 mb-2"><div class="col-span-6"><label class="block text-[10px] font-black text-slate-500 mb-1">KPI</label><input name="kpi${i}" class="field" value="${esc((kpis[i]||{}).kpi||'')}"></div><div class="col-span-3"><label class="block text-[10px] font-black text-slate-500 mb-1">الفعلي</label><input name="actual${i}" type="number" class="field" value="${(kpis[i]||{}).actual||''}"></div><div class="col-span-3"><label class="block text-[10px] font-black text-slate-500 mb-1">الوزن</label><input name="weight${i}" type="number" class="field" value="${(kpis[i]||{}).weight||''}"></div></div>`).join('')}</div><div><label class="block text-xs font-black text-slate-600 mb-1">ملاحظات</label><textarea name="notes" class="field" placeholder="ملاحظات"></textarea></div><button class="btn btn-primary w-full">حفظ</button></form>`)}
function saveAppraisal(e,id){e.preventDefault();let f=new FormData(e.target), scores=[0,1,2,3,4,5].map(i=>({kpi:f.get('kpi'+i),actual:Number(f.get('actual'+i)||0),weight:Number(f.get('weight'+i)||0)})).filter(x=>x.kpi);let obj={id:id||uid('ap'),employeeId:f.get('employeeId'),period:f.get('period'),date:f.get('date'),scores,notes:f.get('notes')};upsert('appraisals',obj,id)}
function upsert(table,obj,id){if(id){let i=DB[table].findIndex(x=>x.id===id);DB[table][i]=obj}else DB[table].unshift(obj);save();closeModal();toast('تم الحفظ بنجاح');render(document.querySelector('main>section:not(.hidden)').id.replace('tab-',''))}
function del(table,id){if(!confirm('هل تريد حذف هذا البيان؟'))return;DB[table]=DB[table].filter(x=>x.id!==id);save();toast('تم الحذف');render(document.querySelector('main>section:not(.hidden)').id.replace('tab-',''))}
function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}

نامج</label><textarea name="description" class="field" placeholder="وصف البرنامج">${esc(c.description)}</textarea></div><button class="btn btn-primary w-full">حفظ البرنامج</button></form>`)}

function openSuccessionForm(id=''){let x=id?byId(DB.successors,id):{employeeId:DB.employees[0]?.id,targetJobId:DB.jobs[0]?.id,performance:80,potential:80,readiness:'جاهز خلال سنة',developmentPlan:''};openModal(id?'تعديل مرشح تعاقب':'إضافة مرشح تعاقب',`<form onsubmit="saveSuccession(event,'${id}')" class="space-y-4"><div class="grid sm:grid-cols-2 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">الموظف المرشح</label><select name="employeeId" class="field">${DB.employees.map(e=>`<option value="${e.id}" ${x.employeeId===e.id?'selected':''}>${esc(e.name)}</option>`).join('')}</select></div><div><label class="block text-xs font-black text-slate-600 mb-1">الوظيفة المستهدفة</label><select name="targetJobId" class="field">${DB.jobs.map(j=>`<option value="${j.id}" ${x.targetJobId===j.id?'selected':''}>${esc(j.title)}</option>`).join('')}</select></div></div><div class="grid sm:grid-cols-3 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">نسبة الأداء %</label><input name="performance" type="number" min="0" max="100" class="field" value="${esc(x.performance)}" placeholder="الأداء"></div><div><label class="block text-xs font-black text-slate-600 mb-1">نسبة الإمكانات %</label><input name="potential" type="number" min="0" max="100" class="field" value="${esc(x.potential)}" placeholder="الإمكانات"></div><div><label class="block text-xs font-black text-slate-600 mb-1">الجاهزية</label><input name="readiness" class="field" value="${esc(x.readiness)}" placeholder="الجاهزية"></div></div><div><label class="block text-xs font-black text-slate-600 mb-1">خطة التطوير</label><textarea name="developmentPlan" class="field" placeholder="خطة التطوير">${esc(x.developmentPlan)}</textarea></div><button class="btn btn-primary w-full">حفظ المرشح</button></form>`)}
function saveSuccession(e,id){e.preventDefault();let f=new FormData(e.target);upsert('successors',{id:id||uid('sc'),employeeId:f.get('employeeId'),targetJobId:f.get('targetJobId'),performance:+f.get('performance'),potential:+f.get('potential'),readiness:f.get('readiness'),developmentPlan:f.get('developmentPlan')},id)}
function openSurveyForm(id=''){let v=id?byId(DB.surveys,id):{courseId:DB.courses[0]?.id,respondent:'',content:5,instructor:5,venue:5,impact:5,comment:''};openModal(id?'تعديل استمارة رضا':'تسجيل استمارة رضا',`<form onsubmit="saveSurvey(event,'${id}')" class="space-y-4"><div><label class="block text-xs font-black text-slate-600 mb-1">البرنامج التدريبي</label><select name="courseId" class="field">${DB.courses.map(c=>`<option value="${c.id}" ${v.courseId===c.id?'selected':''}>${esc(c.title)}</option>`).join('')}</select></div><div><label class="block text-xs font-black text-slate-600 mb-1">اسم المشارك / اختياري</label><input name="respondent" class="field" placeholder="اسم المشارك / اختياري" value="${esc(v.respondent)}"></div><div class="grid sm:grid-cols-4 gap-4"><div><label class="block text-xs font-black text-slate-600 mb-1">تقييم المحتوى</label><input name="content" type="number" min="1" max="5" class="field" value="${esc(v.content)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تقييم المدرب</label><input name="instructor" type="number" min="1" max="5" class="field" value="${esc(v.instructor)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تقييم التنظيم</label><input name="venue" type="number" min="1" max="5" class="field" value="${esc(v.venue)}"></div><div><label class="block text-xs font-black text-slate-600 mb-1">تقييم الأثر</label><input name="impact" type="number" min="1" max="5" class="field" value="${esc(v.impact)}"></div></div><div><label class="block text-xs font-black text-slate-600 mb-1">ملاحظات المتدرب</label><textarea name="comment" class="field" placeholder="ملاحظات المتدرب">${esc(v.comment)}</textarea></div><button class="btn btn-primary w-full">حفظ الاستمارة</button></form>`)}
function saveSurvey(e,id){e.preventDefault();let f=new FormData(e.target);upsert('surveys',{id:id||uid('sv'),courseId:f.get('courseId'),respondent:f.get('respondent'),content:+f.get('content'),instructor:+f.get('instructor'),venue:+f.get('venue'),impact:+f.get('impact'),comment:f.get('comment')},id)}
function exportJSON(){download('talent_suite_full_data.json',JSON.stringify(DB,null,2),'application/json')}
function flattenRows(table){return DB[table].map(x=>{let y={...x};if(y.kpis)y.kpis=JSON.stringify(y.kpis);if(y.scores)y.scores=JSON.stringify(y.scores);return y})}
function exportCSV(table){let rows=flattenRows(table);if(!rows.length)return toast('لا توجد بيانات');let heads=Object.keys(rows[0]);let csv='\ufeff'+heads.join(',')+'\n'+rows.map(r=>heads.map(h=>'"'+String(r[h]??'').replace(/"/g,'""')+'"').join(',')).join('\n');download(table+'.csv',csv,'text/csv;charset=utf-8')}
function exportExcel(){if(typeof XLSX==='undefined'){toast('مكتبة Excel تحتاج اتصال إنترنت. استخدم CSV أو JSON.');return}let wb=XLSX.utils.book_new();['orgUnits','employees','jobs','questions','exams','appraisals','budgetItems','courses','successors','surveys'].forEach(t=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(flattenRows(t)),t));XLSX.writeFile(wb,'talent_suite_data.xlsx')}
function parseCSV(txt){let lines=txt.replace(/^\ufeff/,'').split(/\r?\n/).filter(Boolean);let heads=lines.shift().split(',').map(h=>h.replace(/^"|"$/g,''));return lines.map(line=>{let vals=line.match(/("([^"]|"")*"|[^,]+)/g)||[];let o={};heads.forEach((h,i)=>o[h]=(vals[i]||'').replace(/^"|"$/g,'').replace(/""/g,'"'));return o})}
function importFile(){let file=document.getElementById('importFile').files[0], target=document.getElementById('importTarget').value;if(!file)return toast('اختر ملفاً أولاً');let r=new FileReader();r.onload=e=>{try{let data;if(file.name.endsWith('.json')){data=JSON.parse(e.target.result);if(target==='all'){DB=data}else DB[target]=data}else if(file.name.endsWith('.csv')){DB[target]=parseCSV(e.target.result)}else{if(typeof XLSX==='undefined')return toast('مكتبة Excel تحتاج اتصال إنترنت');let wb=XLSX.read(e.target.result,{type:'array'});let ws=wb.Sheets[wb.SheetNames[0]];DB[target]=XLSX.utils.sheet_to_json(ws)};['jobs','appraisals'].forEach(t=>DB[t]?.forEach(x=>{if(typeof x.kpis==='string')try{x.kpis=JSON.parse(x.kpis)}catch(e){};if(typeof x.scores==='string')try{x.scores=JSON.parse(x.scores)}catch(e){}}));save();toast('تم الاستيراد بنجاح');render('data');updateHeader()}catch(err){alert('تعذر الاستيراد: '+err.message)}};if(file.name.match(/\.xlsx?$|\.xls$/))r.readAsArrayBuffer(file);else r.readAsText(file,'utf-8')}
function resetDemo(){localStorage.removeItem(KEY);DB=JSON.parse(JSON.stringify(DEFAULT_DB));migrateCriticalJobs();ensureCriticalSeedData();ensureBulkSeedData();save();toast('تمت استعادة البيانات التجريبية مع إحصائيات الوظائف الحرجة');render('dashboard');updateHeader()}
try{load();initTabs();render('dashboard');}catch(err){console.error(err);document.body.insertAdjacentHTML('afterbegin',`<div style="direction:rtl;background:#fee2e2;color:#991b1b;padding:12px 16px;font-family:Cairo,Arial;border-bottom:1px solid #fecaca;font-weight:700">حدث خطأ في تهيئة البيانات: ${err.message}</div>`);}
